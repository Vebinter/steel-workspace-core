name: ✅ Steel-Check

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List modules
        run: find modules/ -name "*.sh" -o -name "*.py" | wc -l | xargs -I{} echo "✅ Modules found: {}"
      - name: Verify README
        run: grep -q "ADF1345C75BF6102DFB71F03F4621630BAFF7949" README.md && echo "✅ Key ID in README"
